<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Manage Users</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1a1f2e;
            --spotify-green: #1db954;
            --spotify-green-hover: #1ed760;
            --green-glow: rgba(29, 185, 84, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #8b949e;
            --border: #30363d;
            --danger: #f85149;
            --danger-hover: #da3633;
            --danger-glow: rgba(248, 81, 73, 0.25);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #121212, #000000);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .title-section h2 {
            font-size: 2.4rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #ffffff, var(--spotify-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-section p {
            color: var(--text-muted);
            margin: 8px 0 0;
            font-size: 15px;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid var(--spotify-green);
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--spotify-green);
            color: #000000;
            transform: translateX(-6px);
            box-shadow: 0 0 20px var(--green-glow);
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 30px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .search-container input::placeholder {
            color: var(--text-muted);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--spotify-green);
            box-shadow: 0 0 0 4px var(--green-glow);
        }

        /* Table */
        .table-wrapper {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: var(--spotify-green);
            color: #000000;
            padding: 20px 24px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.8px;
        }

        tbody td {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s ease;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(29, 185, 84, 0.08);
        }

        /* User Info */
        .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--spotify-green);
            color: #000000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-email {
            color: var(--text-muted);
            font-family: 'SF Mono', monospace;
            font-size: 14px;
        }

        /* Actions */
        .management-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-action {
            padding: 9px 18px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Updated Delete Button - Now Fully Red */
        .btn-delete {
            background: rgba(248, 81, 73, 0.18);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: #ffffff;
            border-color: var(--danger-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px var(--danger-glow);
        }

        .btn-delete:active {
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            .title-section h2 {
                font-size: 2rem;
            }
            tbody td {
                padding: 16px 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="nav-header">
        <div class="title-section">
            <h2>User Management</h2>
            <p>Total active accounts: <span id="user-count" style="color: var(--spotify-green);">0</span></p>
        </div>
        <a href="admin-dashboard.html" class="back-link">
            ← Dashboard
        </a>
    </div>

    <div class="search-container">
        <input type="text" id="userSearch" placeholder="Search users by name or email..." onkeyup="filterUsers()">
    </div>

    <div class="table-wrapper">
        <table id="users-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Email Address</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Users will be injected here via script.js -->
            </tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
<script>
    loadUsers();

    function filterUsers() {
        let input = document.getElementById('userSearch').value.toLowerCase();
        let rows = document.querySelectorAll("#users-table tbody tr");
        rows.forEach(row => {
            let text = row.textContent.toLowerCase();
            row.style.display = text.includes(input) ? "" : "none";
        });
    }
</script>

</body>
</html>
