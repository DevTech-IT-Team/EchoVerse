<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f7fa;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .dashboard-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 600px;
        }

        .card {
            padding: 20px;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: 0.2s;
            font-size: 20px;
            font-weight: 600;
        }

        .card:hover {
            background: #e9eef5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Welcome Admin</h1>

    <div class="dashboard-container">
        <div class="card" onclick="goUsers()">👥 Manage Users</div>
        <div  class="card" onclick="goEvents()">📅 View Booked Events</div>
        <div class="card" onclick="logoutAdmin()">🚪 Logout</div>
    </div>

    <script>
        const token = localStorage.getItem("adminToken");

        if (!token) {
            window.location.href = "admin-login.html";
        }

        function goUsers() {
            window.location.href = "users.html";
        }

        function goEvents() {
            window.location.href = "booked-events.html";  // you will create this page next
        }

        function logoutAdmin() {
            localStorage.removeItem("adminToken");
            window.location.href = "admin-login.html";
        }
    </script>

</body>
</html>
