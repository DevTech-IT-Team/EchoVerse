<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1d1d1d);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            width: 380px;
            padding: 35px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            outline: none;
            background: rgba(255,255,255,0.12);
            color: white;
        }

        input::placeholder {
            color: #dcdcdc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: #0f9d58;
            border: none;
            font-size: 16px;
            border-radius: 10px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #0c7e47;
        }

        .back-link {
            margin-top: 15px;
            display: block;
            color: #8bc34a;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>Admin Login</h2>

        <input type="email" id="email" placeholder="Admin Email" />

        <input type="password" id="password" placeholder="Password" />

        <button onclick="adminLogin()">Login</button>

        <a href="../login.html" class="back-link">Back to User Login</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
