<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Event</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --spotify-green: #1db954;
            --spotify-green-hover: #1ed760;
            --green-glow: rgba(29, 185, 84, 0.2);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-muted: #8b949e;
            --border: #30363d;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, #121212, #000000);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 620px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
        }

        .title {
            font-size: 2.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(to right, #ffffff, var(--spotify-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--spotify-green);
            box-shadow: 0 0 0 4px var(--green-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 40px 0;
        }

        .events-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .event-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .event-option:hover {
            background: rgba(29, 185, 84, 0.1);
            border-color: var(--spotify-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .event-option input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--spotify-green);
            cursor: pointer;
            flex-shrink: 0;
        }

        .event-option span {
            font-size: 16px;
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            margin-top: 32px;
            padding: 16px;
            background: var(--spotify-green);
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: var(--spotify-green-hover);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px var(--green-glow);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .card {
                padding: 30px;
            }
            .title {
                font-size: 2rem;
            }
            .event-option {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h1 class="title">Book Your Event</h1>

        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="userName" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
            <label>Your Email</label>
            <input type="email" id="userEmail" placeholder="Enter your email" required>
        </div>

        <div class="divider"></div>

        <h2 class="events-title">Select Events to Book</h2>

        <form id="eventForm">
            <label class="event-option">
                <input type="checkbox" name="events" value="Girl and a Guy">
                <span>Girl and a Guy</span>
            </label>

            <label class="event-option">
                <input type="checkbox" name="events" value="Live Band">
                <span>Live Band</span>
            </label>

            <label class="event-option">
                <input type="checkbox" name="events" value="Karaoke">
                <span>Karaoke</span>
            </label>

            <label class="event-option">
                <input type="checkbox" name="events" value="Yoga Pants">
                <span>Yoga Pants</span>
            </label>

            <label class="event-option">
                <input type="checkbox" name="events" value="Freestone Keys">
                <span>Freestone Keys</span>
            </label>

            <label class="event-option">
                <input type="checkbox" name="events" value="Call-In Solo">
                <span>Call-In Solo</span>
            </label>

            <button type="button" class="submit-btn" onclick="submitEventBooking()">Submit Booking</button>
        </form>
    </div>
</div>

<script>
    const API = "https://collinfreestone.onrender.com/api";

    async function submitEventBooking() {
        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();

        const selectedEvents = [...document.querySelectorAll('input[name="events"]:checked')]
            .map(e => e.value);

        if (!name || !email || selectedEvents.length === 0) {
            alert("Please fill all fields and select at least one event.");
            return;
        }

        try {
            const res = await fetch(`${API}/events/book`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, email, events: selectedEvents })
            });

            const data = await res.json();

            if (res.ok) {
                alert("Booking Submitted Successfully!");
                window.location.href = "index.html";
            } else {
                alert("Error: " + (data.message || "Something went wrong."));
            }
        } catch (err) {
            alert("Network error. Please try again.");
            console.error(err);
        }
    }
</script>

</body>
</html>
