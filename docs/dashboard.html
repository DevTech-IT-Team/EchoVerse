<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Event Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- PREMIUM DASHBOARD STYLES --- */
        :root {
            --spotify-black: #090909;
            --spotify-dark-grey: #121212;
            --spotify-light-grey: #1e1e1e;
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --text-white: #ffffff;
            --text-muted: #a7a7a7;
            --border: #282828;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--spotify-black);
            color: var(--text-white);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        nav {
            width: 240px;
            background-color: #000;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--spotify-green);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
        }

        .nav-links li { margin-bottom: 8px; }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 0.9rem;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
            background-color: var(--spotify-light-grey);
        }

        .logout-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .logout-btn:hover { color: #ff4d4d; }

        /* Main */
        main {
            flex-grow: 1;
            padding: 40px 60px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #1e1e1e 0%, #090909 50%);
            position: relative;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* Show Cards Grid */
        .shows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .show-card {
            background-color: #181818;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .show-card:hover {
            background-color: #282828;
            transform: translateY(-5px);
            border-color: #333;
        }

        .show-card h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .show-card p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }

        .btn-book {
            display: inline-block;
            margin-top: 15px;
            background-color: var(--spotify-green);
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-book:hover { transform: scale(1.05); background-color: var(--spotify-green-hover); }

        /* Bookings Table */
        .bookings-table-wrapper {
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #252525;
            color: var(--text-muted);
            text-align: left;
            padding: 15px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #181818;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            border: 1px solid #333;
        }

        .modal-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { font-size: 1.3rem; }

        .close-modal {
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-muted); }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #252525;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 8px;
            color: #fff;
        }

        .btn-submit {
            width: 100%;
            background: var(--spotify-green);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover { background: var(--spotify-green-hover); }

    </style>
</head>
<body>

    <nav>
        <div class="logo">
           <i class="fas fa-compact-disc"></i> EchoVerse
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a href="Songs.html"><i class="fas fa-music"></i> Song List</a></li>
            <li><a href="UpcomingShows.html"><i class="fas fa-calendar-alt"></i> Public shows</a></li>
        </ul>
        <a href="#" class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Log Out</a>
    </nav>

    <main>
        <header>
            <h1 id="welcome-msg">Welcome back</h1>
            <p id="user-email" style="color: var(--text-muted);">Manage your bookings and explore upcoming shows.</p>
        </header>

        <section>
            <h2 class="section-title">Upcoming Shows</h2>
            <div class="shows-grid" id="shows-container">
                <!-- Shows will be loaded here -->
                <p>Loading shows...</p>
            </div>
        </section>

        <section>
            <h2 class="section-title">My Bookings</h2>
            <div class="bookings-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Date</th>
                            <th>Location</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-container">
                        <!-- Bookings will be loaded here -->
                        <tr><td colspan="4">Loading your bookings...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalShowTitle">Book Event</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="bookingForm">
                <input type="hidden" id="showId">
                <div class="form-group">
                    <label>Show Name</label>
                    <input type="text" id="modalShowName" readonly>
                </div>
                <div class="form-group">
                    <label>Show Date</label>
                    <input type="text" id="modalShowDate" readonly>
                </div>
                <div class="form-group">
                    <label>Number of Guests</label>
                    <input type="number" id="guests" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Special Requests</label>
                    <textarea id="requests" rows="3" placeholder="Any dietary needs or requests?"></textarea>
                </div>
                <button type="submit" class="btn-submit">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
